<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model Example</title>
    <!--filename: CSSBoxModel.html-->

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h2 {
            text-align: left;
            font-family: 'Times New Roman', Times, serif;
            font-size: 34px;
            margin: 80px 140px 40px 0;
            color: #000;
        }

        .box {
            width: 180px;
            height: 150px;
            background-color: #721689;
            color: #ffffff;
            padding: 20px;
            border: 5px solid #9821b6;
            margin: 20px auto;
            text-align: center;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* Different Box Model Effects */
        .box:hover {
            background-color: #da3cb5;
            border-color: #c246a5;
            transform: scale(1.02);
            box-shadow: 12px 12px 18px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <h2>CSS Box Hover Effects</h2>

    <div class="box">
        <p>Hover over me!</p>
    </div>

</body>
</html>
